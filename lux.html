<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Web Experience 2026</title>
    <style>
        :root {
            --primary-bg: #0f111a;
            --accent-color: #d4af37; /* Gold */
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(100, 150, 255, 0.05), transparent 25%);
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 4rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            transform: translateY(30px);
            opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 1rem 3rem;
            border: 1px solid var(--accent-color);
            border-radius: 50px;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.1em;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--primary-bg);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Ambient floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(212, 175, 55, 0.15);
            top: 20%;
            left: 20%;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(100, 150, 255, 0.1);
            bottom: 10%;
            right: 15%;
            animation-delay: -5s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .glass-container { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="hero">
        <div class="glass-container">
            <h1 class="title">ELEGANCE REDEFINED</h1>
            <p class="subtitle">
                洗練されたUIと最先端のWeb技術が融合。<br>
                2026年のトレンド「ダーク×グラスモーフィズム」を取り入れた、<br>
                究極のラグジュアリー体験をご提供します。
            </p>
            <a href="#" class="btn">EXPLORE MORE</a>
        </div>
    </main>
</body>
</html>
