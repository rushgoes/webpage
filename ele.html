<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refined Luxury Experience</title>
    <style>
        :root {
            /* User preferred colors: #FFFFFF and #CCFFCC, adding a refined dark option */
            --bg-color: #0d1117;
            --surface-color: rgba(204, 255, 204, 0.05); /* Tinted with #CCFFCC */
            --surface-border: rgba(204, 255, 204, 0.15);
            --text-main: #ffffff;
            --accent-color: #ccffcc;
            --accent-glow: rgba(204, 255, 204, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(204, 255, 204, 0.08), transparent 30%),
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.03), transparent 30%);
        }

        /* Animated background elements */
        .ambient-light {
            position: absolute;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            background: var(--accent-glow);
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: pulse 10s ease-in-out infinite alternate;
        }

        .ambient-light-1 { top: -10%; left: -10%; }
        .ambient-light-2 { bottom: -10%; right: -10%; animation-delay: -5s; }

        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 3rem 4rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        /* Interactive glow effect on hover */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(204, 255, 204, 0.06), transparent 40%);
            z-index: -1;
            transition: opacity 0.3s;
            opacity: 0;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .title span {
            color: var(--accent-color);
            font-weight: 400;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .description {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .action-button {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--surface-border);
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-size: 1rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(204, 255, 204, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .action-button:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .action-button:hover::after {
            left: 100%;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0.4; }
        }

        /* Interactive elements based on previous fun UI requests */
        .particle {
            position: absolute;
            background: var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="ambient-light ambient-light-1"></div>
    <div class="ambient-light ambient-light-2"></div>

    <main class="glass-card" id="card">
        <h1 class="title">Next <span>Level</span></h1>
        <p class="description">
            洗練されたグラスモーフィズムと、<br>
            ミニマルでありながら遊び心を忘れない<br>
            インタラクティブなデザイン。
        </p>
        <button class="action-button" onclick="createParticles(event)">DISCOVER</button>
    </main>

    <script>
        // Interactive hover effect
        document.getElementById('card').onmousemove = e => {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            e.target.style.setProperty('--mouse-x', `${x}px`);
            e.target.style.setProperty('--mouse-y', `${y}px`);
        };

        // Fun interaction (particles on click)
        function createParticles(e) {
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                document.body.appendChild(particle);

                const size = Math.random() * 8 + 4;
                const rect = e.target.getBoundingClientRect();
                const startX = e.clientX;
                const startY = e.clientY;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${startX}px`;
                particle.style.top = `${startY}px`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 0.8 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => particle.remove();
            }
        }
    </script>
</body>
</html>
