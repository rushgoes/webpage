<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>うさぎが動くページ</title>
    <style>
        /* 全体のゆるっとしたスタイリング */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffe6eb; /* パステルピンク */
            font-family: 'Hiragino Rounded W8 Pro', 'Hiragino Kaku Gothic ProN', sans-serif;
        }
        
        #title-container {
            text-align: center;
            margin-top: 50px;
            color: #ff768b;
        }

        /* うさぎのスタイル */
        #usagi {
            position: absolute;
            width: 100px; /* 画像を使う場合は適宜調整してください */
            height: auto;
            top: 50%;
            left: 50%;
            font-size: 80px; /* 絵文字用 */
            /* なめらかに移動・反転させるためのトランジション */
            transition: top 1s ease-in-out, left 1s ease-in-out, transform 0.3s;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            /* 初期状態の中心寄せ */
            transform: translate(-50%, -50%);
        }

        /* クリック時のジャンプアニメーション */
        .jump {
            animation: jump-anim 0.4s ease;
        }

        @keyframes jump-anim {
            0% { transform: translateY(0) scale(1, 1); }
            30% { transform: translateY(-60px) scale(0.9, 1.1); }
            50% { transform: translateY(-80px) scale(1, 1); }
            70% { transform: translateY(-60px) scale(1.1, 0.9); }
            100% { transform: translateY(0) scale(1, 1); }
        }

        /* ピャッ！という吹き出しのスタイル */
        .pya-text {
            position: absolute;
            color: #ff4757;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            animation: fade-up 0.8s forwards;
            z-index: 101;
        }

        @keyframes fade-up {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }
    </style>
</head>
<body>

    <div id="title-container">
        <h1>🐰 うさぎがピャッと動き回るページ 🐰</h1>
        <p>あちこち動き回るうさぎをクリックしてみてね！</p>
    </div>

    <!-- うさぎの要素 -->
    <!-- 画像にする場合はこのdivの中身を <img src="usagi.png" alt="うさぎ" style="width:100%;"> などに変更してください -->
    <div id="usagi">🐰</div>

    <script>
        const usagi = document.getElementById('usagi');
        let isMoving = true;
        let currentScaleX = 1;

        // ランダムな位置に移動する関数
        function moveUsagi() {
            if (!isMoving) return;

            // 画面の幅と高さから、画面外に出ないようにランダムな座標を計算
            const maxX = window.innerWidth - 120;
            const maxY = window.innerHeight - 120;

            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            // 現在のX座標を取得して、向かう方向に応じて左右を反転させる
            const rect = usagi.getBoundingClientRect();
            const currentX = rect.left;
            
            if (randomX < currentX) {
                currentScaleX = 1; // 左向き
            } else {
                currentScaleX = -1; // 右向き
            }

            usagi.style.transform = `scaleX(${currentScaleX})`;
            usagi.style.left = `${randomX}px`;
            usagi.style.top = `${randomY}px`;
        }

        // 1秒ごとにうさぎを動かす
        setInterval(moveUsagi, 1000);

        // うさぎをクリックしたときのイベント
        usagi.addEventListener('click', (e) => {
            // 自動移動を一時停止
            isMoving = false;
            
            // ジャンプアニメーションを付与
            usagi.style.transform = `scaleX(${currentScaleX})`; // 向きを保持
            usagi.classList.add('jump');

            // 「ピャッ！」の文字を生成
            const text = document.createElement('div');
            text.className = 'pya-text';
            text.innerText = 'ピャッ！';
            
            // クリックした位置の近くに文字を配置
            text.style.left = `${e.clientX + 20}px`;
            text.style.top = `${e.clientY - 40}px`;
            document.body.appendChild(text);

            // アニメーション終了後にリセット
            setTimeout(() => {
                usagi.classList.remove('jump');
                setTimeout(() => text.remove(), 400); // 文字は少し遅れて消す
                isMoving = true;
                moveUsagi(); // すぐに次の移動を開始
            }, 400);
        });

        // ロード時に最初の移動を少し遅らせて実行
        setTimeout(moveUsagi, 500);
    </script>
</body>
</html>
