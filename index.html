<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, [data-theme="light"] {
      --color-bg:             #f7f6f2;
      --color-surface:        #f9f8f5;
      --color-surface-2:      #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-divider:        #dcd9d5;
      --color-border:         #d4d1ca;
      --color-text:           #28251d;
      --color-text-muted:     #7a7974;
      --color-text-faint:     #bab9b4;
      --color-primary:        #01696f;
      --color-primary-hover:  #0c4e54;
      --color-primary-highlight: #cedcd8;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem;  --radius-xl: 1rem; --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --space-1:.25rem; --space-2:.5rem;  --space-3:.75rem; --space-4:1rem;
      --space-5:1.25rem;--space-6:1.5rem; --space-8:2rem;   --space-10:2.5rem;
      --space-12:3rem;  --space-16:4rem;
    }
    [data-theme="dark"] {
      --color-bg:             #0e0e0c;
      --color-surface:        #141412;
      --color-surface-2:      #1a1a18;
      --color-surface-offset: #1e1e1c;
      --color-divider:        #252522;
      --color-border:         #2e2e2b;
      --color-text:           #e2e0db;
      --color-text-muted:     #797876;
      --color-text-faint:     #4a4946;
      --color-primary:        #4f98a3;
      --color-primary-hover:  #227f8b;
      --color-primary-highlight: #1e3535;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.4);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.5);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg:#0e0e0c; --color-surface:#141412; --color-surface-2:#1a1a18;
        --color-surface-offset:#1e1e1c; --color-divider:#252522; --color-border:#2e2e2b;
        --color-text:#e2e0db; --color-text-muted:#797876; --color-text-faint:#4a4946;
        --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#1e3535;
        --shadow-sm:0 1px 2px oklch(0 0 0 / 0.3);
        --shadow-md:0 4px 12px oklch(0 0 0 / 0.4);
        --shadow-lg:0 12px 32px oklch(0 0 0 / 0.5);
      }
    }

    html { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility; }
    body { min-height:100dvh; font-family:var(--font-body); font-size:var(--text-sm); color:var(--color-text); background:var(--color-bg); display:flex; flex-direction:column; }
    img, video { display:block; max-width:100%; }
    button { cursor:pointer; background:none; border:none; font:inherit; color:inherit; }
    a, button { transition: color var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition); }
    :focus-visible { outline:2px solid var(--color-primary); outline-offset:3px; border-radius:var(--radius-sm); }

    /* Header */
    .header {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:var(--space-3) var(--space-6);
      background:color-mix(in oklab, var(--color-bg) 85%, transparent);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--color-divider);
    }
    .logo { display:flex; align-items:center; gap:var(--space-2); font-size:var(--text-base); font-weight:600; letter-spacing:-0.01em; color:var(--color-text); text-decoration:none; }
    .logo svg { color:var(--color-primary); flex-shrink:0; }
    .theme-toggle { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-md); color:var(--color-text-muted); }
    .theme-toggle:hover { background:var(--color-surface-offset); color:var(--color-text); }

    /* Layout */
    .app { display:flex; flex:1; overflow:hidden; height:calc(100dvh - 53px); }

    /* Sidebar */
    .sidebar { width:220px; flex-shrink:0; background:var(--color-surface); border-right:1px solid var(--color-divider); overflow-y:auto; padding:var(--space-4) 0; }
    .sidebar-label { font-size:var(--text-xs); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--color-text-faint); padding:0 var(--space-3) var(--space-2); display:block; }
    .folder-btn { width:100%; display:flex; align-items:center; gap:var(--space-2); padding:var(--space-2) var(--space-3); border-radius:var(--radius-md); color:var(--color-text-muted); font-size:var(--text-sm); font-weight:500; text-align:left; margin-bottom:2px; }
    .folder-btn:hover { background:var(--color-surface-offset); color:var(--color-text); }
    .folder-btn.active { background:var(--color-primary-highlight); color:var(--color-primary); }
    .folder-count { margin-left:auto; font-size:var(--text-xs); color:var(--color-text-faint); background:var(--color-surface-offset); padding:1px 6px; border-radius:var(--radius-full); }
    .folder-btn.active .folder-count { background:color-mix(in oklab, var(--color-primary) 15%, transparent); color:var(--color-primary); }

    /* Main */
    .main { flex:1; overflow-y:auto; padding:var(--space-6) var(--space-8); display:flex; flex-direction:column; gap:var(--space-6); }
    .main-header { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:var(--space-3); }
    .main-title { font-size:var(--text-xl); font-weight:700; letter-spacing:-0.02em; line-height:1.1; }
    .main-meta { font-size:var(--text-xs); color:var(--color-text-muted); margin-top:var(--space-1); }
    .breadcrumb { display:flex; align-items:center; gap:var(--space-1); font-size:var(--text-xs); color:var(--color-text-muted); margin-bottom:var(--space-1); }
    .breadcrumb span { color:var(--color-text-faint); }

    .view-controls { display:flex; gap:var(--space-1); }
    .view-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-md); color:var(--color-text-muted); }
    .view-btn:hover { background:var(--color-surface-offset); color:var(--color-text); }
    .view-btn.active { background:var(--color-surface-2); color:var(--color-primary); box-shadow:var(--shadow-sm); }

    /* Empty state */
    .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:var(--space-16) var(--space-8); color:var(--color-text-muted); }
    .empty-icon { width:56px; height:56px; margin-bottom:var(--space-4); color:var(--color-text-faint); }
    .empty-state h3 { font-size:var(--text-base); font-weight:600; color:var(--color-text); margin-bottom:var(--space-2); }
    .empty-state p { font-size:var(--text-sm); max-width:36ch; line-height:1.6; }

    /* File grid */
    .file-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(min(180px, 100%), 1fr)); gap:var(--space-4); }
    .file-list { display:flex; flex-direction:column; gap:var(--space-1); }

    /* File card */
    .file-card { background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h / 0.07); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:transform var(--transition), box-shadow var(--transition), border-color var(--transition); }
    .file-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); border-color:oklch(from var(--color-text) l c h / 0.14); }
    .file-card:active { transform:translateY(0); }
    .card-thumb { aspect-ratio:4/3; background:var(--color-surface-2); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .card-thumb img { width:100%; height:100%; object-fit:cover; transition:transform var(--transition); }
    .file-card:hover .card-thumb img { transform:scale(1.04); }
    .card-thumb video { width:100%; height:100%; object-fit:cover; }
    .thumb-icon { color:var(--color-text-faint); }
    .thumb-overlay { position:absolute; inset:0; background:oklch(0 0 0 / 0); display:flex; align-items:center; justify-content:center; transition:background var(--transition); }
    .file-card:hover .thumb-overlay { background:oklch(0 0 0 / 0.25); }
    .thumb-play { width:44px; height:44px; border-radius:var(--radius-full); background:oklch(1 0 0 / 0.9); display:flex; align-items:center; justify-content:center; color:#111; opacity:0; transform:scale(0.8); transition:opacity var(--transition), transform var(--transition); }
    .file-card:hover .thumb-play { opacity:1; transform:scale(1); }
    .card-info { padding:var(--space-3); }
    .card-name { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--color-text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-meta { font-size:var(--text-xs); color:var(--color-text-faint); margin-top:2px; }

    /* File row */
    .file-row { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3) var(--space-4); background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h / 0.07); border-radius:var(--radius-md); cursor:pointer; transition:background var(--transition), box-shadow var(--transition); }
    .file-row:hover { background:var(--color-surface-2); box-shadow:var(--shadow-sm); }
    .row-icon { width:36px; height:36px; flex-shrink:0; background:var(--color-surface-offset); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--color-primary); }
    .row-name { font-family:var(--font-mono); font-size:var(--text-sm); font-weight:500; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-type { font-size:var(--text-xs); color:var(--color-text-faint); }
    .row-open { color:var(--color-text-faint); opacity:0; transition:opacity var(--transition); }
    .file-row:hover .row-open { opacity:1; }

    /* Text viewer */
    .text-content { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:var(--space-6); font-family:var(--font-mono); font-size:var(--text-sm); line-height:1.8; color:var(--color-text); white-space:pre-wrap; word-break:break-word; overflow-x:auto; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; z-index:200; background:oklch(0 0 0 / 0.85); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:var(--space-4); opacity:0; pointer-events:none; transition:opacity var(--transition); }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg); max-width:90vw; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; transform:translateY(8px) scale(0.98); transition:transform var(--transition); }
    .modal-overlay.open .modal { transform:none; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:var(--space-3) var(--space-4); border-bottom:1px solid var(--color-divider); flex-shrink:0; }
    .modal-title { font-family:var(--font-mono); font-size:var(--text-sm); font-weight:500; }
    .modal-close { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-md); color:var(--color-text-muted); }
    .modal-close:hover { background:var(--color-surface-offset); color:var(--color-text); }
    .modal-body { overflow:auto; flex:1; display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
    .modal-body img { max-width:80vw; max-height:75vh; object-fit:contain; border-radius:var(--radius-md); }
    .modal-body video { max-width:80vw; max-height:75vh; border-radius:var(--radius-md); }
    .modal-body .text-content { width:70vw; max-height:65vh; }

    /* Shimmer */
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skeleton { background:linear-gradient(90deg, var(--color-surface-offset) 25%, var(--color-surface-2) 50%, var(--color-surface-offset) 75%); background-size:200% 100%; animation:shimmer 1.5s ease-in-out infinite; border-radius:var(--radius-sm); }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .sidebar { display:none; }
      .main { padding:var(--space-4); }
      .file-grid { grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:var(--space-3); }
    }
  </style>
</head>
<body>

<header class="header">
  <a class="logo" href="#">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <rect x="3" y="3" width="8" height="8" rx="1.5"/>
      <rect x="13" y="3" width="8" height="8" rx="1.5"/>
      <rect x="3" y="13" width="8" height="8" rx="1.5"/>
      <rect x="13" y="13" width="8" height="8" rx="1.5"/>
    </svg>
    Media Viewer
  </a>
  <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode"></button>
</header>

<div class="app">
  <nav class="sidebar" aria-label="フォルダ一覧">
    <div style="padding:0 var(--space-3) var(--space-4)">
      <span class="sidebar-label">フォルダ</span>
      <button class="folder-btn active" data-folder="text" onclick="setFolder('text')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        text
        <span class="folder-count" id="count-text">—</span>
      </button>
      <button class="folder-btn" data-folder="picture" onclick="setFolder('picture')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        picture
        <span class="folder-count" id="count-picture">—</span>
      </button>
      <button class="folder-btn" data-folder="movie" onclick="setFolder('movie')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        movie
        <span class="folder-count" id="count-movie">—</span>
      </button>
    </div>
  </nav>

  <main class="main" id="main">
    <div class="main-header">
      <div>
        <div class="breadcrumb"><span>./</span><span id="breadcrumb-folder">text</span></div>
        <h1 class="main-title" id="main-title">text</h1>
        <p class="main-meta" id="main-meta">テキストファイルを表示しています</p>
      </div>
      <div style="display:flex;align-items:center;gap:var(--space-3);padding-top:var(--space-1)">
        <div class="view-controls">
          <button class="view-btn active" id="btn-grid" onclick="setView('grid')" aria-label="グリッド表示">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="btn-list" onclick="setView('list')" aria-label="リスト表示">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="file-container"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-el">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-el"></span>
      <button class="modal-close" onclick="closeModalDirect()" aria-label="閉じる">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// Theme toggle
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  const sun = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const moon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function upd(){ t.innerHTML = d==='dark'?sun:moon; t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode'); }
  upd();
  t && t.addEventListener('click', ()=>{ d=d==='dark'?'light':'dark'; r.setAttribute('data-theme',d); upd(); });
})();

// Config
const FOLDERS = {
  text:    { label:'テキストファイルを表示しています', exts:['txt','md','csv','log','json','xml','html','css','js','ts'], type:'text' },
  picture: { label:'画像ファイルを表示しています',     exts:['jpg','jpeg','png','bmp','gif','webp'],                    type:'image' },
  movie:   { label:'動画ファイルを表示しています',     exts:['mp4','webm','mov'],                                       type:'video' },
};

let currentFolder = 'text';
let currentView   = 'grid';
const fileLists   = { text:null, picture:null, movie:null };

async function discoverFiles(folder) {
  return new Promise(resolve => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', './' + folder + '/', true);
    xhr.onload = () => {
      if (xhr.status === 200) {
        const doc = new DOMParser().parseFromString(xhr.responseText, 'text/html');
        const exts = FOLDERS[folder].exts;
        const files = [...doc.querySelectorAll('a[href]')]
          .map(a => a.getAttribute('href'))
          .filter(href => exts.includes(href.split('.').pop().toLowerCase()))
          .map(href => {
            const name = decodeURIComponent(href.replace(/\/$/, '').split('/').pop());
            return { name, path: './' + folder + '/' + name };
          });
        resolve(files);
      } else { resolve([]); }
    };
    xhr.onerror = () => resolve([]);
    xhr.send();
  });
}

function setFolder(folder) {
  currentFolder = folder;
  document.querySelectorAll('.folder-btn').forEach(b => b.classList.toggle('active', b.dataset.folder === folder));
  document.getElementById('breadcrumb-folder').textContent = folder;
  document.getElementById('main-title').textContent = folder;
  document.getElementById('main-meta').textContent = FOLDERS[folder].label;
  render();
}

function setView(view) {
  currentView = view;
  document.getElementById('btn-grid').classList.toggle('active', view==='grid');
  document.getElementById('btn-list').classList.toggle('active', view==='list');
  renderFiles();
}

async function render() {
  const c = document.getElementById('file-container');
  c.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-4)">' +
    Array(6).fill('<div class="skeleton" style="aspect-ratio:4/3;border-radius:var(--radius-lg)"></div>').join('') + '</div>';
  if (!fileLists[currentFolder]) fileLists[currentFolder] = await discoverFiles(currentFolder);
  document.getElementById('count-' + currentFolder).textContent = fileLists[currentFolder].length;
  renderFiles();
}

function ext(n){ return n.split('.').pop().toLowerCase(); }
function extU(n){ return ext(n).toUpperCase(); }

function renderFiles() {
  const c = document.getElementById('file-container');
  const files = fileLists[currentFolder] || [];
  if (!files.length) {
    c.innerHTML = `<div class="empty-state">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
        <line x1="12" y1="11" x2="12" y2="15"/><line x1="10" y1="13" x2="14" y2="13"/>
      </svg>
      <h3>${currentFolder}/ フォルダが空です</h3>
      <p>ファイルを配置すると、ここに表示されます。<br>対応形式: ${FOLDERS[currentFolder].exts.map(e=>'.'+e).join(', ')}</p>
    </div>`;
    return;
  }
  if (currentView === 'grid') {
    c.innerHTML = '<div class="file-grid">' + files.map(renderCard).join('') + '</div>';
  } else {
    c.innerHTML = '<div class="file-list">' + files.map(renderRow).join('') + '</div>';
  }
}

function esc(s){ return s.replace(/'/g,"\\'"); }

function renderCard(f) {
  const type = FOLDERS[currentFolder].type;
  let thumb;
  if (type === 'image') {
    thumb = `<div class="card-thumb">
      <img src="${f.path}" alt="${f.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="thumb-overlay"></div>
    </div>`;
  } else if (type === 'video') {
    thumb = `<div class="card-thumb">
      <video src="${f.path}" preload="metadata" muted playsinline style="pointer-events:none"></video>
      <div class="thumb-overlay"><div class="thumb-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
    </div>`;
  } else {
    thumb = `<div class="card-thumb" style="height:90px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="thumb-icon"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>`;
  }
  return `<div class="file-card" onclick="openFile('${esc(f.path)}','${esc(f.name)}')" role="button" tabindex="0" aria-label="${f.name}を開く" onkeydown="if(event.key==='Enter')openFile('${esc(f.path)}','${esc(f.name)}')">
    ${thumb}
    <div class="card-info">
      <div class="card-name" title="${f.name}">${f.name}</div>
      <div class="card-meta">${extU(f.name)}</div>
    </div>
  </div>`;
}

function renderRow(f) {
  const type = FOLDERS[currentFolder].type;
  const icons = {
    text:  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>',
    image: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
    video: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>',
  };
  return `<div class="file-row" onclick="openFile('${esc(f.path)}','${esc(f.name)}')" role="button" tabindex="0" aria-label="${f.name}を開く" onkeydown="if(event.key==='Enter')openFile('${esc(f.path)}','${esc(f.name)}')">
    <div class="row-icon">${icons[type]}</div>
    <div class="row-name" title="${f.name}">${f.name}</div>
    <div class="row-type">${extU(f.name)}</div>
    <svg class="row-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </div>`;
}

async function openFile(path, name) {
  const type = FOLDERS[currentFolder].type;
  const overlay = document.getElementById('modal-overlay');
  const body    = document.getElementById('modal-body');
  const titleEl = document.getElementById('modal-title-el');
  titleEl.textContent = name;
  body.innerHTML = '<div style="width:160px;height:160px;display:flex;align-items:center;justify-content:center;color:var(--color-text-muted)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (type === 'image') {
    const img = new Image();
    img.alt = name;
    img.onload  = () => { body.innerHTML=''; body.appendChild(img); };
    img.onerror = () => { body.innerHTML='<p style="color:var(--color-text-muted);padding:var(--space-8)">画像を読み込めませんでした</p>'; };
    img.src = path;
  } else if (type === 'video') {
    const vid = document.createElement('video');
    vid.src = path; vid.controls = true; vid.autoplay = true;
    vid.style.cssText = 'max-width:80vw;max-height:75vh;border-radius:var(--radius-md)';
    body.innerHTML=''; body.appendChild(vid);
  } else {
    try {
      const r = await fetch(path);
      if (!r.ok) throw new Error();
      const text = await r.text();
      const pre = document.createElement('pre');
      pre.className = 'text-content'; pre.textContent = text;
      body.innerHTML=''; body.appendChild(pre);
    } catch {
      body.innerHTML='<p style="color:var(--color-text-muted);padding:var(--space-8)">ファイルを読み込めませんでした</p>';
    }
  }
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => {
    const vid = document.querySelector('#modal-body video');
    if (vid) { vid.pause(); vid.src=''; }
    document.getElementById('modal-body').innerHTML = '';
  }, 200);
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalDirect(); });

// Init
render();
</script>
</body>
</html>
